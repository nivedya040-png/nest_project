<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Portal</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f6f9;
        }

        .navbar{
            background:#1f2937;
            padding:15px;
            text-align:center;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin:0 20px;
            font-size:18px;
        }

        .navbar a:hover{
            color:#38bdf8;
        }

        .container{
            width:80%;
            margin:auto;
            padding:40px;
            text-align:center;
        }

        .btn{
            background:#0ea5e9;
            color:white;
            padding:12px 25px;
            border-radius:5px;
            text-decoration:none;
        }

        .btn:hover{
            background:#0284c7;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/feedback/">Submit Feedback</a>
    <a href="/about/">About Us</a>
    <a href="/contact/">Contact</a>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
