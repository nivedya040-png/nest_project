<!DOCTYPE html>
<html>
<head>
    <title>Submit Feedback</title>

    <style>
        body{
            margin:0;
            font-family:'Poppins',sans-serif;
            background:#f4f7fc;
        }

        nav{
            background:linear-gradient(90deg,#0d6efd,#0dcaf0);
            padding:18px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 20px;
            font-size:18px;
            font-weight:bold;
        }

        nav a:hover{
            color:#ffd43b;
        }

        .feedback-card{
            width:650px;
            margin:50px auto;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }
        .form-control{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
    font-size:15px;
}

.form-control:focus{
    outline:none;
    border-color:#0d6efd;
    box-shadow:0 0 8px rgba(13,110,253,0.3);
}

        h1{
            text-align:center;
            color:#0d6efd;
            margin-bottom:30px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:8px;
            box-sizing:border-box;
            font-size:15px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        footer{
            text-align:center;
            margin-top:20px;
            color:#666;
        }
    </style>
</head>

<body>

    <nav>
        <a href="/">Home</a>
        <a href="/feedback/">Submit Feedback</a>
        <a href="/about/">About Us</a>
        <a href="/contact/">Contact</a>
    </nav>

    <div class="feedback-card">

        <h1>🎓 Submit Feedback</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Submit Feedback
            </button>
        </form>

    </div>

    <footer>
        <p>© 2026 Student Feedback Portal</p>
    </footer>

</body>
</html>
